name: AutoQA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Lint check
        run: pip install flake8 && flake8 autoqa/ --max-line-length=120 --ignore=E501,W503

  demo-run:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AutoQA on demo site (no AI)
        run: python main.py --url https://books.toscrape.com --headless --no-ai --output-dir ./demo-reports

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoqa-demo-report
          path: ./demo-reports/*.html
